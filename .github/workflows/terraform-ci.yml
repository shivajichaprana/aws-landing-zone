###############################################################################
# Terraform CI — Format, Validate, Lint
# Runs on every push to main and on all pull requests.
###############################################################################

name: Terraform CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Format check — ensures consistent HCL style
  # ---------------------------------------------------------------------------
  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Check formatting
        run: terraform fmt -check -recursive -diff

  # ---------------------------------------------------------------------------
  # Stage 2: Validate — checks HCL syntax and module references per module
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Modules
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        module:
          - modules/organizations
          - modules/scp
          - modules/sso
          - modules/logging
          - modules/account-vending
          - examples/complete
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Terraform Init
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ matrix.module }}
        run: terraform validate

  # ---------------------------------------------------------------------------
  # Stage 3: Lint — tflint with AWS ruleset catches provider-specific issues
  # ---------------------------------------------------------------------------
  lint:
    name: TFLint
    runs-on: ubuntu-latest
    needs: fmt
    strategy:
      fail-fast: false
      matrix:
        module:
          - modules/organizations
          - modules/scp
          - modules/sso
          - modules/logging
          - modules/account-vending
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Cache TFLint plugins
        uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ hashFiles('.tflint.hcl') }}
          restore-keys: tflint-

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init

      - name: Terraform Init (for module references)
        working-directory: ${{ matrix.module }}
        run: terraform init -backend=false

      - name: Run TFLint
        working-directory: ${{ matrix.module }}
        run: tflint --config "${{ github.workspace }}/.tflint.hcl" --format compact

  # ---------------------------------------------------------------------------
  # Stage 4: Tests — Terraform native test framework
  # ---------------------------------------------------------------------------
  test:
    name: Terraform Tests
    runs-on: ubuntu-latest
    needs: [validate, lint]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"

      - name: Run Terraform Tests
        run: terraform test -test-directory=tests
